# Visa Checker Configuration Example
# Copy to config.yaml and fill in your values.
# All ${ENV_VAR} references are resolved from environment variables.

targets:
  - country: France
    provider: tlscontact         # vfs_global | tlscontact | bls | capago
    centre: London
    visa_type: short_stay
    earliest_date: "2026-06-01"
    latest_date: "2026-09-30"

  - country: Germany
    provider: vfs_global
    centre: London
    visa_type: short_stay
    visa_sub_category: ""         # optional: 3rd wizard dropdown (e.g. "Normal", "Urgent")
    earliest_date: "2026-06-01"
    latest_date: "2026-09-30"

credentials:
  tlscontact:
    email: ${TLS_EMAIL}
    password: ${TLS_PASSWORD}
  vfs_global:
    email: ${VFS_EMAIL}
    password: ${VFS_PASSWORD}
  bls:
    email: ${BLS_EMAIL}
    password: ${BLS_PASSWORD}
  capago:
    email: ${CAPAGO_EMAIL}
    password: ${CAPAGO_PASSWORD}

polling:
  interval_seconds: 90
  jitter_pct: 0.20   # +/-20% random jitter on each interval
  max_retries: 5

alerts:
  telegram:
    enabled: true
    bot_token: ${TELEGRAM_BOT_TOKEN}
    chat_id: ${TELEGRAM_CHAT_ID}
  email:
    enabled: false
    smtp_host: smtp.gmail.com
    smtp_port: 587
    username: ${EMAIL_USER}
    password: ${EMAIL_PASS}
    to: ${EMAIL_TO}
  ntfy:
    enabled: true
    server: https://ntfy.sh
    topic: ${NTFY_TOPIC}
  sms:
    enabled: false
    twilio_sid: ${TWILIO_SID}
    twilio_token: ${TWILIO_TOKEN}
    from_number: ${TWILIO_FROM}
    to_number: ${TWILIO_TO}

  discord:
    enabled: false
    webhook_url: ${DISCORD_WEBHOOK_URL}
    username: "Visa Checker"   # display name shown in Discord
    # avatar_url: https://example.com/avatar.png  # optional

  wxpusher:
    # Personal WeChat push — free, no business account needed
    # Setup: https://wxpusher.zjiecode.com → create app → scan QR in WeChat → get UID
    enabled: false
    app_token: ${WXPUSHER_APP_TOKEN}
    uid: ${WXPUSHER_UID}
    # topic_id: ${WXPUSHER_TOPIC_ID}  # alternative: broadcast to all topic subscribers

  wechat_work:
    # WeChat Work (WeCom) group bot webhook
    # Setup: WeCom group → right-click → Add Group Robot → Create → copy URL
    enabled: false
    webhook_url: ${WECOM_WEBHOOK_URL}
    # mention_mobiles: ["+447700900000"]  # optional: @mention someone in the group

proxies:
  enabled: true      # all traffic is routed through proxies.txt (set false to disable)
  provider: file     # brightdata | file
  endpoint: ${PROXY_ENDPOINT}
  file: proxies.txt  # path to proxy list — any of these formats (one per line):
                     #   host:port
                     #   host:port:username:password
                     #   http://username:password@host:port
                     # Selection: random. Failed proxies are skipped automatically.
                     # Pool resets to full list once all proxies are exhausted.

captcha:
  # Free options (no API key required):
  #   audio_recaptcha        — reCAPTCHA v2 (VFS Global) via Google speech-to-text
  #                            requires: uv add playwright-recaptcha  +  ffmpeg
  #   hcaptcha_accessibility — hCaptcha (TLScontact) via official accessibility cookie
  #                            get token free at: https://www.hcaptcha.com/accessibility
  #   manual                 — pauses + sends Telegram screenshot, waits for you to solve
  # Paid: 2captcha / anticaptcha
  provider: audio_recaptcha

  api_key: ${CAPTCHA_API_KEY}                          # only for 2captcha/anticaptcha
  hcaptcha_accessibility_token: ${HCAPTCHA_ACCESSIBILITY_TOKEN}  # only for hcaptcha_accessibility
  manual_telegram_bot_token: ${TELEGRAM_BOT_TOKEN}     # reuses your existing bot
  manual_telegram_chat_id: ${TELEGRAM_CHAT_ID}

state:
  db_path: data/state.db

logging:
  level: INFO
  file: data/visa_checker.log
